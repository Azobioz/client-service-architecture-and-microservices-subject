version: "3.9"

services:

  user-db:
    image: postgres:15
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"

  order-db:
    image: postgres:15
    environment:
      POSTGRES_DB: order_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"

  service-for-user:
    image: azobioz/service-for-user:latest
    ports:
      - "8081:8081"
    depends_on:
      - user-db

  order-service:
    image: azobioz/order-service:latest
    ports:
      - "8082:8082"
    depends_on:
      - order-db
      - service-for-user